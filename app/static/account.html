<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Account</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="calc-shell account-shell">
      <header class="calc-header">
        <div>
          <h1>Account</h1>
          <p class="subtitle">change your password here</p>
        </div>
        <div class="header-actions">
          <a class="ghost-button" href="/calculations.html" data-auth-state="logged-in">calculations</a>
          <a class="ghost-button" href="/login.html" data-auth-state="logged-out">login</a>
          <button id="logout" class="danger-soft" type="button" data-auth-state="logged-in">logout</button>
        </div>
      </header>

      <section class="panel account-panel">
        <h2>Update password</h2>
        <form id="password-form" novalidate>
          <div class="field">
            <label for="current-password">Current password</label>
            <input id="current-password" name="current_password" type="password" minlength="8" autocomplete="current-password" required />
          </div>
          <div class="field">
            <label for="new-password">New password</label>
            <input id="new-password" name="new_password" type="password" minlength="8" autocomplete="new-password" required />
          </div>
          <div class="field">
            <label for="confirm-password">Confirm new password</label>
            <input id="confirm-password" name="confirm_password" type="password" minlength="8" autocomplete="new-password" required />
          </div>
          <button type="submit">Save password</button>
        </form>
      </section>

      <p id="account-message" class="message" role="status" aria-live="polite"></p>
    </main>

    <script src="/static/session.js"></script>
    <script src="/static/account.js"></script>
  </body>
</html>
